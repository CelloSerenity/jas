name: Build

on:
  workflow_dispatch:
  push:
  pull_request: 

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-26
          - os: macos-26-intel
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install OpenSSL on ubuntu-24.04-arm
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Cache cargo registry and git dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install cargo-leptos
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-leptos

      - name: Build with leptos
        run: cargo leptos build --release

      - name: Stage build artifacts
        shell: bash
        run: |
          mkdir -p dist/target
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/jas.exe dist/jas.exe
          else
            cp target/release/jas dist/jas
          fi
          cp -r target/site dist/target/site

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jas-${{ runner.os }}-${{ runner.arch }}
          path: dist
